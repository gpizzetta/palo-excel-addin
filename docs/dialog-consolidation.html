<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consolidation — Palo</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #323130;
      background: #faf9f8;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #edebe9;
      background: #fff;
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    header p { margin: 6px 0 0 0; font-size: 13px; color: #605e5c; }
    #err {
      margin: 12px 20px;
      padding: 10px 12px;
      background: #fde7e9;
      color: #a4262c;
      border-radius: 2px;
      font-size: 13px;
      display: none;
    }
    #err.show { display: block; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 16px 20px 20px;
    }
    .consol-panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      gap: 14px;
      align-items: stretch;
      min-height: 0;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 4px;
      padding: 10px;
    }
    .panel label {
      font-size: 12px;
      font-weight: 600;
      color: #201f1e;
      margin-bottom: 8px;
    }
    .panel select[multiple] {
      flex: 1;
      width: 100%;
      min-height: min(50vh, 420px);
      font-size: 13px;
      padding: 6px;
      border: 1px solid #8a8886;
      border-radius: 2px;
    }
    ul.consol-selected {
      flex: 1;
      list-style: none;
      margin: 0;
      padding: 0;
      overflow: auto;
      min-height: min(50vh, 420px);
      border: 1px solid #8a8886;
      border-radius: 2px;
      background: #fff;
      font-size: 13px;
    }
    ul.consol-selected li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid #f3f2f1;
    }
    ul.consol-selected li:last-child { border-bottom: none; }
    ul.consol-selected li button {
      padding: 4px 10px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .mid {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding-top: 28px;
    }
    .mid button {
      padding: 8px 12px;
      font-size: 12px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-weight: 600;
    }
    .mid .primary { background: #0078d4; color: #fff; }
    .mid .primary:hover { background: #106ebe; }
    .mid .secondary { background: #edebe9; color: #323130; }
    button.secondary {
      background: #edebe9;
      color: #323130;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary:hover { background: #e1dfdd; }
    .hint { font-size: 12px; color: #605e5c; margin: 12px 0 0 0; line-height: 1.45; }
    footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-shrink: 0;
    }
    footer button {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }
    footer .cancel { background: #edebe9; color: #323130; }
    footer .save { background: #0078d4; color: #fff; }
    footer .save:hover { background: #106ebe; }
    footer .cancel:hover { background: #e1dfdd; }
  </style>
</head>
<body>
  <header>
    <h1>Consolidation</h1>
    <p id="subtitle"></p>
  </header>
  <div id="err" role="alert"></div>
  <div class="main">
    <div class="consol-panels">
      <div class="panel">
        <label for="consolAvail">Disponibles</label>
        <select id="consolAvail" size="20" multiple aria-label="Éléments disponibles"></select>
      </div>
      <div class="mid">
        <button type="button" id="consolBtnAdd" class="primary">Ajouter →</button>
      </div>
      <div class="panel">
        <label>Enfants de la consolidation (ordre)</label>
        <ul id="consolSelectedList" class="consol-selected" aria-label="Enfants sélectionnés"></ul>
      </div>
    </div>
    <p class="hint">Sélection à gauche puis « Ajouter », ou double-clic. « Retirer » retire un enfant à droite.</p>
    <footer>
      <button type="button" id="btnCancel" class="cancel">Annuler</button>
      <button type="button" id="btnSave" class="save">Enregistrer</button>
    </footer>
  </div>
  <script src="dialog-consolidation.js?v=1.0.14.0" type="text/javascript"></script>
</body>
</html>
