<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Action Palo</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 16px; }
    h3 { margin: 0 0 12px 0; font-size: 16px; }
    .k { color: #666; font-size: 12px; margin-top: 8px; }
    .v { font-weight: 600; margin-top: 2px; word-break: break-word; }
    .hint { margin-top: 12px; font-size: 12px; color: #555; }
    button#btnClose { margin-top: 16px; padding: 6px 10px; }
    #enamePicker { display: none; margin-top: 14px; }
    #enameList {
      margin-top: 8px;
      max-height: 280px;
      overflow: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px;
      background: #fafafa;
    }
    button.ename-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 8px;
      margin: 2px 0;
      border: none;
      background: #fff;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
    }
    button.ename-item:hover { background: #e8f4fc; }
    #elistErr { color: #a4262c; font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h3>Action</h3>
  <div class="k">Cellule</div>
  <div class="v" id="address">(inconnue)</div>
  <div class="k">Fonction détectée</div>
  <div class="v" id="func">(aucune)</div>
  <div class="k">Formule</div>
  <div class="v" id="formula"></div>
  <div class="hint" id="defaultHint">Affiche le nom de fonction trouvé dans la cellule active.</div>

  <div id="enamePicker">
    <div class="k">Éléments (ordre alphabétique)</div>
    <div class="hint" id="enameHint"></div>
    <div id="enameList"></div>
    <div id="elistErr"></div>
  </div>

  <button id="btnClose" type="button">Fermer</button>

  <script src="ename-formula-args.js?v=1.0.53.0" type="text/javascript"></script>
  <script src="md5.js?v=1.0.53.0" type="text/javascript"></script>
  <script src="action-popup.js?v=1.0.53.0" type="text/javascript"></script>
</body>
</html>
