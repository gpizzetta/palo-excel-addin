<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Palo — Connexion</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #323130;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 img { width: 20px; height: 20px; }
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 12px;
    }
    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #8a8886;
      border-radius: 2px;
    }
    input:focus {
      outline: 2px solid #0078d4;
      outline-offset: -1px;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 8px 12px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #106ebe; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 1.2em;
    }
    #status.ok { color: #107c10; }
    #status.err { color: #a4262c; }
    .hint {
      font-size: 11px;
      color: #605e5c;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>
    <img src="assets/icon-32.png?v=1.0.6.0" alt="" width="20" height="20" />
    Connexion Palo
  </h1>
  <form id="form" novalidate>
    <label for="url">URL du serveur</label>
    <input type="url" id="url" name="url" placeholder="https://127.0.0.1:7777" autocomplete="url" />

    <label for="username">Utilisateur</label>
    <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" />

    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />

    <button type="submit" id="btnSave">Enregistrer la connexion</button>
  </form>
  <p id="status" role="status"></p>
  <p class="hint">
    Les valeurs sont enregistrées dans les <strong>paramètres de ce classeur</strong> (Office.js). Ne partagez pas le fichier avec des identifiants sensibles.
  </p>

  <script src="taskpane-connection.js?v=1.0.6.0" type="text/javascript"></script>
</body>
</html>
