<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Palo</title>
  <link rel="icon" href="/palo-excel-addin/favicon.ico" type="image/x-icon">
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #323130;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid #edebe9;
      flex-shrink: 0;
    }
    #dimension-wrap {
      flex-shrink: 0;
      padding: 8px 12px;
      border-bottom: 1px solid #edebe9;
      background: #faf9f8;
    }
    #dimension-wrap label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #605e5c;
      margin-bottom: 4px;
    }
    #dimension-select {
      box-sizing: border-box;
      width: 100%;
      padding: 6px 8px;
      font: inherit;
      border: 1px solid #8a8886;
      border-radius: 2px;
      outline: none;
      background: #fff;
    }
    #dimension-select:focus {
      border-color: #0078d4;
      box-shadow: 0 0 0 1px #0078d4 inset;
    }
    #dimension-select:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    #filter-wrap {
      flex-shrink: 0;
      padding: 8px 12px;
      border-bottom: 1px solid #edebe9;
      background: #faf9f8;
    }
    #element-filter {
      box-sizing: border-box;
      width: 100%;
      padding: 6px 10px;
      font: inherit;
      border: 1px solid #8a8886;
      border-radius: 2px;
      outline: none;
    }
    #element-filter:focus {
      border-color: #0078d4;
      box-shadow: 0 0 0 1px #0078d4 inset;
    }
    #list-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 4px 0;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      padding: 8px 12px;
      cursor: pointer;
    }
    li.consolidated {
      font-weight: 700;
    }
    li:hover {
      background: #f3f2f1;
    }
    li:active {
      background: #edebe9;
    }
    #empty {
      padding: 12px;
      color: #605e5c;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <h1>Choisissez un element</h1>
  <div id="dimension-wrap">
    <label for="dimension-select">Dimension</label>
    <select id="dimension-select" aria-label="Dimension"></select>
  </div>
  <div id="filter-wrap">
    <label for="element-filter" class="visually-hidden">Filtrer</label>
    <input type="search" id="element-filter" placeholder="Filtrer les elements..." autocomplete="off" spellcheck="false">
  </div>
  <div id="list-wrap">
    <ul id="elements"></ul>
    <div id="empty" style="display:none;"></div>
  </div>
  <script>
    var PICKER_STORAGE_KEY = "palo_ename_picker_v1";

    function sendPick(name, dimension) {
      var payload = JSON.stringify({
        element: name,
        dimension: dimension || ""
      });
      if (Office.context && Office.context.ui && typeof Office.context.ui.messageParent === "function") {
        Office.context.ui.messageParent(payload, { targetOrigin: "*" });
      }
    }

    Office.onReady(function () {
      var ul = document.getElementById("elements");
      var empty = document.getElementById("empty");
      var dimSelect = document.getElementById("dimension-select");
      var filterInput = document.getElementById("element-filter");
      var allElements = [];
      var lastLoadedDimension = "";
      var dimensionChangeFromUser = false;

      function showEmpty(text) {
        empty.style.display = "block";
        empty.textContent = text;
      }

      function getItemName(item) {
        if (item && typeof item === "object" && !Array.isArray(item)) {
          return String(item.name || "");
        }
        return String(item || "");
      }

      function isConsolidatedItem(item) {
        if (item && typeof item === "object" && !Array.isArray(item)) {
          return Boolean(item.isConsolidated);
        }
        return false;
      }

      function renderList(items) {
        ul.innerHTML = "";
        if (!items || !items.length) {
          showEmpty(allElements.length ? "Aucun element ne correspond au filtre." : "Liste vide.");
          return;
        }
        empty.style.display = "none";
        items.forEach(function (item) {
          var name = getItemName(item);
          if (!name) {
            return;
          }
          var li = document.createElement("li");
          li.textContent = name;
          if (isConsolidatedItem(item)) {
            li.classList.add("consolidated");
          }
          li.addEventListener("click", function () {
            var dim = dimSelect ? String(dimSelect.value || "") : "";
            sendPick(name, dim);
          });
          ul.appendChild(li);
        });
      }

      function applyFilter() {
        var q = String(filterInput && filterInput.value ? filterInput.value : "").trim().toLowerCase();
        if (!q) {
          renderList(allElements);
          return;
        }
        var filtered = allElements.filter(function (item) {
          var name = getItemName(item);
          return name.toLowerCase().indexOf(q) !== -1;
        });
        renderList(filtered);
      }

      function fillList(items) {
        allElements = Array.isArray(items) ? items.slice() : [];
        if (filterInput) {
          filterInput.value = "";
        }
        applyFilter();
        if (filterInput && typeof filterInput.focus === "function") {
          try {
            filterInput.focus();
          } catch (_e) {
          }
        }
      }

      function fillDimensionSelect(names, current) {
        if (!dimSelect) {
          return;
        }
        dimensionChangeFromUser = false;
        dimSelect.innerHTML = "";
        var list = Array.isArray(names) ? names.slice() : [];
        list.forEach(function (n) {
          var nm = String(n || "").trim();
          if (!nm) {
            return;
          }
          var opt = document.createElement("option");
          opt.value = nm;
          opt.textContent = nm;
          dimSelect.appendChild(opt);
        });
        var cur = String(current || "").trim();
        if (cur && list.indexOf(cur) !== -1) {
          dimSelect.value = cur;
        } else if (dimSelect.options.length) {
          dimSelect.value = dimSelect.options[0].value;
        }
        lastLoadedDimension = dimSelect.value || "";
        dimensionChangeFromUser = true;
      }

      function requestDimensionElements(dimension) {
        if (!dimension || !Office.context || !Office.context.ui || typeof Office.context.ui.messageParent !== "function") {
          return;
        }
        if (dimSelect) {
          dimSelect.disabled = true;
        }
        try {
          Office.context.ui.messageParent(
            JSON.stringify({ type: "loadDimension", dimension: dimension }),
            { targetOrigin: "*" }
          );
        } catch (_e) {
          if (dimSelect) {
            dimSelect.disabled = false;
          }
        }
      }

      if (filterInput) {
        filterInput.addEventListener("input", applyFilter);
      }

      if (dimSelect) {
        dimSelect.addEventListener("change", function () {
          if (!dimensionChangeFromUser) {
            return;
          }
          var dim = String(dimSelect.value || "").trim();
          if (!dim || dim === lastLoadedDimension) {
            return;
          }
          lastLoadedDimension = dim;
          requestDimensionElements(dim);
        });
      }

      function applyInitPayload(o) {
        if (!o || typeof o !== "object") {
          return;
        }
        if (Array.isArray(o.dimensions)) {
          fillDimensionSelect(o.dimensions, o.currentDimension);
        }
        if (Array.isArray(o.elements)) {
          fillList(o.elements);
          if (dimSelect && !dimSelect.disabled) {
            lastLoadedDimension = String(dimSelect.value || "").trim();
          }
        }
        if (dimSelect) {
          dimSelect.disabled = false;
        }
      }

      function tryReadLocalStorage() {
        try {
          var raw = window.localStorage.getItem(PICKER_STORAGE_KEY);
          if (!raw) {
            return false;
          }
          var o = JSON.parse(raw);
          if (o && (Array.isArray(o.dimensions) || Array.isArray(o.elements))) {
            applyInitPayload(o);
            return true;
          }
        } catch (_e) {
          // ignore
        }
        return false;
      }

      function tryReadOfficeRuntime(cb) {
        var storage = typeof OfficeRuntime !== "undefined" ? OfficeRuntime.storage : null;
        if (!storage || typeof storage.getItem !== "function") {
          cb(null);
          return;
        }
        storage.getItem(PICKER_STORAGE_KEY).then(cb).catch(function () {
          cb(null);
        });
      }

      tryReadLocalStorage();

      function onParentMessage(arg) {
        try {
          var payload = JSON.parse(String(arg && arg.message ? arg.message : ""));
          if (payload && payload.type === "init") {
            applyInitPayload(payload);
            return;
          }
          if (payload && payload.type === "elements" && Array.isArray(payload.elements)) {
            fillList(payload.elements);
            if (payload.dimension && dimSelect) {
              dimensionChangeFromUser = false;
              dimSelect.value = String(payload.dimension);
              lastLoadedDimension = String(payload.dimension);
              dimensionChangeFromUser = true;
            }
            if (dimSelect) {
              dimSelect.disabled = false;
            }
            return;
          }
          if (payload && payload.type === "loadDimensionError") {
            if (dimSelect) {
              dimSelect.disabled = false;
            }
            showEmpty(String(payload.message || "Impossible de charger les elements."));
          }
        } catch (_e) {
          // ignore
        }
      }

      if (Office.context && Office.context.ui && typeof Office.context.ui.addHandlerAsync === "function") {
        Office.context.ui.addHandlerAsync(
          Office.EventType.DialogParentMessageReceived,
          onParentMessage,
          function (asyncResult) {
            if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
              try {
                Office.context.ui.messageParent("palo-ename-ready", { targetOrigin: "*" });
              } catch (_e) {
                if (ul.children.length === 0 && !dimSelect.options.length && !tryReadLocalStorage()) {
                  showEmpty("Impossible de signaler le dialogue au parent.");
                }
              }
            } else if (ul.children.length === 0 && !dimSelect.options.length && !tryReadLocalStorage()) {
              showEmpty("DialogParentMessageReceived non disponible.");
            }
          }
        );
      } else if (ul.children.length === 0 && !dimSelect.options.length && !tryReadLocalStorage()) {
        showEmpty("API dialogue limitee.");
      }

      tryReadOfficeRuntime(function (raw) {
        if (raw && ul.children.length === 0 && (!dimSelect || !dimSelect.options.length)) {
          try {
            var o = JSON.parse(raw);
            applyInitPayload(o);
          } catch (_e) {
            // ignore
          }
        }
      });

      setTimeout(function () {
        if (ul.children.length === 0 && (!dimSelect || !dimSelect.options.length)) {
          if (!tryReadLocalStorage()) {
            tryReadOfficeRuntime(function (raw) {
              if (raw && ul.children.length === 0 && (!dimSelect || !dimSelect.options.length)) {
                try {
                  var o = JSON.parse(raw);
                  applyInitPayload(o);
                  if (!o || (!o.elements || !o.elements.length) && (!o.dimensions || !o.dimensions.length)) {
                    showEmpty("Liste non recue. Recharger le complement (DialogApi 1.2).");
                  }
                } catch (_e) {
                  showEmpty("Liste non recue.");
                }
              } else if (ul.children.length === 0 && (!dimSelect || !dimSelect.options.length)) {
                showEmpty("Liste non recue.");
              }
            });
          }
        }
      }, 1500);
    });
  </script>
</body>
</html>
