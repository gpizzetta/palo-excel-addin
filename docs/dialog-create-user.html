<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>Nouvel utilisateur — Palo</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      color: #323130;
      background: #faf9f8;
      padding: 24px;
    }
    .box {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 4px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 600;
    }
    .sub { margin: 0 0 20px 0; font-size: 13px; color: #605e5c; }
    label {
      display: block;
      font-size: 12px;
      color: #605e5c;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #8a8886;
      border-radius: 2px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    #err {
      display: none;
      padding: 10px 12px;
      background: #fde7e9;
      color: #a4262c;
      border-radius: 2px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    #err.show { display: block; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }
    .cancel { background: #edebe9; color: #323130; }
    .cancel:hover { background: #e1dfdd; }
    .ok { background: #0078d4; color: #fff; }
    .ok:hover { background: #106ebe; }
    .ok:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Nouvel utilisateur</h1>
    <p class="sub">Compte sur le serveur Palo (Jedox).</p>
    <div id="err" role="alert"></div>
    <label for="inputName">Nom d’utilisateur</label>
    <input type="text" id="inputName" autocomplete="off" />
    <label for="inputPass">Mot de passe</label>
    <input type="password" id="inputPass" autocomplete="new-password" />
    <label for="inputPass2">Confirmer le mot de passe</label>
    <input type="password" id="inputPass2" autocomplete="new-password" />
    <div class="actions">
      <button type="button" id="btnCancel" class="cancel">Annuler</button>
      <button type="button" id="btnOk" class="ok">Créer</button>
    </div>
  </div>
  <script src="dialog-create-user.js?v=1.0.21.0" type="text/javascript"></script>
</body>
</html>
