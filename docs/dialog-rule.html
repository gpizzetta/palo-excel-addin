<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>Règle cube — Palo</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #323130;
      background: #faf9f8;
      padding: 16px 20px;
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 18px;
      font-weight: 600;
    }
    .sub { margin: 0 0 14px 0; font-size: 12px; color: #605e5c; word-break: break-all; }
    label {
      display: block;
      font-size: 12px;
      color: #605e5c;
      margin-bottom: 6px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      flex: 1;
      min-height: 180px;
      padding: 10px 12px;
      border: 1px solid #8a8886;
      border-radius: 2px;
      font-size: 13px;
      font-family: Consolas, "Segoe UI Mono", monospace;
      line-height: 1.35;
      resize: vertical;
    }
    #inputComment {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #8a8886;
      border-radius: 2px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    #err {
      display: none;
      padding: 10px 12px;
      background: #fde7e9;
      color: #a4262c;
      border-radius: 2px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    #err.show { display: block; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
      flex-shrink: 0;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }
    .cancel { background: #edebe9; color: #323130; }
    .cancel:hover { background: #e1dfdd; }
    .ok { background: #0078d4; color: #fff; }
    .ok:hover { background: #106ebe; }
    .ok:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1 id="dlgTitle">Règle</h1>
  <p class="sub" id="dlgSub"></p>
  <div id="err" role="alert"></div>
  <label for="areaDef">Définition (règle Jedox)</label>
  <textarea id="areaDef" spellcheck="false" aria-label="Définition de la règle"></textarea>
  <label for="inputComment">Commentaire (optionnel)</label>
  <input type="text" id="inputComment" autocomplete="off" />
  <div class="actions">
    <button type="button" id="btnCancel" class="cancel">Annuler</button>
    <button type="button" id="btnOk" class="ok">Enregistrer</button>
  </div>
  <script src="dialog-rule.js?v=1.0.25.0" type="text/javascript"></script>
</body>
</html>
